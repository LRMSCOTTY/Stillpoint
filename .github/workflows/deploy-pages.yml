name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # No `environment:` block here on purpose: declaring one requires GitHub
    # to resolve/auto-create a "github-pages" Environment resource, which
    # needs repo-admin permissions this integration's token doesn't have
    # (it failed silently, pre-runner, with no logs). deploy-pages itself
    # only needs the pages/id-token permissions already granted above.
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
